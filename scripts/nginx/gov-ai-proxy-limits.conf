# Gov AI — reverse-proxy limits for large uploads and slow local LLM responses.
#
# Install: deploy.sh copies this to /etc/nginx/snippets/gov-ai-proxy-limits.conf
# Then add ONE of the following inside the server block that serves the app:
#   include /etc/nginx/snippets/gov-ai-proxy-limits.conf;
# Or nest it only under the location that proxy_passes to Uvicorn (e.g. /api/).
#
# After editing the main site config: sudo nginx -t && sudo systemctl reload nginx

# 413: default nginx client_max_body_size is 1m — multipart PDF/ZIP uploads fail before FastAPI runs.
client_max_body_size 64m;

# 504: local llama.cpp generation/embedding can exceed default ~60s proxy read timeout.
proxy_connect_timeout 300s;
proxy_send_timeout 720s;
proxy_read_timeout 720s;
